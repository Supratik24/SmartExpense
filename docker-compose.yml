services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartexpense
      POSTGRES_USER: smartexpense
      POSTGRES_PASSWORD: smartexpense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartexpense -d smartexpense"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    env_file: .env.example
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  ml:
    build: ./ml
    ports:
      - "8000:8000"

  web:
    build: ./web
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
